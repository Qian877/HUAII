<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>槐的运营图书馆 🐙</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f5f5f5;color:#2c2c2c;min-height:100vh;}
  .container{max-width:960px;margin:0 auto;padding:20px 16px;}

  /* Header */
  .header{text-align:center;padding:32px 0 24px;}
  .header h1{font-size:32px;font-weight:700;letter-spacing:-0.5px;}
  .header .sub{font-size:14px;color:#999;margin-top:6px;}
  .header .date-badge{display:inline-block;background:#fff;border-radius:20px;padding:4px 14px;font-size:13px;color:#888;margin-top:8px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}

  /* Stats bar */
  .stats-bar{display:flex;gap:12px;justify-content:center;margin-bottom:28px;flex-wrap:wrap;}
  .stat-item{background:#fff;border-radius:14px;padding:10px 18px;box-shadow:0 1px 6px rgba(0,0,0,0.04);text-align:center;min-width:80px;}
  .stat-item .num{font-size:20px;font-weight:700;color:#f48fb1;}
  .stat-item .label{font-size:11px;color:#aaa;margin-top:2px;}

  /* Search */
  .search-bar{position:relative;margin-bottom:24px;}
  .search-bar input{width:100%;padding:12px 16px 12px 44px;border:1px solid #ddd;border-radius:14px;font-size:15px;outline:none;background:#fff;transition:border 0.2s,box-shadow 0.2s;}
  .search-bar input:focus{border-color:#f48fb1;box-shadow:0 0 0 3px rgba(244,143,177,0.12);}
  .search-bar .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:#bbb;}

  /* Filter tabs */
  .filter-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .filter-tab{padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid #e0e0e0;background:#fff;color:#888;transition:all 0.2s;}
  .filter-tab:hover{background:#f5f5f5;}
  .filter-tab.active{background:#f48fb1;color:#fff;border-color:#f48fb1;}

  /* Shelf section */
  .section-title{font-size:16px;font-weight:600;color:#2c2c2c;margin:24px 0 12px;display:flex;align-items:center;gap:8px;}
  .shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:8px;}

  .book-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,0.04);cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;border:1px solid transparent;position:relative;}
  .book-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.08);border-color:#e0e0e0;}
  .book-card .icon{font-size:28px;margin-bottom:6px;}
  .book-card .title{font-size:14px;font-weight:600;color:#2c2c2c;margin-bottom:4px;}
  .book-card .desc{font-size:12px;color:#999;line-height:1.5;}
  .book-card .tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-top:8px;background:#f0f0f0;color:#888;}
  .book-card .tag.tool{background:#fff3e0;color:#e65100;}
  .book-card .tag.concept{background:#e3f2fd;color:#1565c0;}
  .book-card .tag.case{background:#fce4ec;color:#c62828;}
  .book-card .tag.data{background:#e8f5e9;color:#2e7d32;}

  /* Quick add section */
  .quick-add{background:#fff;border-radius:16px;padding:18px 20px;margin:20px 0;box-shadow:0 1px 6px rgba(0,0,0,0.04);}
  .quick-add .qa-title{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .quick-add textarea{width:100%;border:1px solid #ddd;border-radius:10px;padding:10px 12px;font-size:13px;resize:vertical;min-height:60px;outline:none;font-family:inherit;background:#fafafa;}
  .quick-add textarea:focus{border-color:#f48fb1;}
  .quick-add .qa-actions{display:flex;gap:8px;margin-top:8px;justify-content:flex-end;}
  .quick-add .qa-btn{padding:6px 16px;border-radius:10px;font-size:13px;cursor:pointer;border:none;}
  .quick-add .qa-btn.save{background:#f48fb1;color:#fff;}
  .quick-add .qa-btn.save:hover{background:#f06292;}

  /* Recent entries */
  .recent-list{list-style:none;}
  .recent-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0ece4;font-size:13px;}
  .recent-item:last-child{border-bottom:none;}
  .recent-item .ri-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .recent-item .ri-cat{font-size:11px;padding:1px 8px;border-radius:8px;background:#f0f0f0;color:#888;flex-shrink:0;}
  .recent-item .ri-text{color:#555;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .recent-item .ri-time{font-size:11px;color:#aaa;flex-shrink:0;}

  /* Saved entries display */
  .saved-entries{background:#fff;border-radius:16px;padding:18px 20px;box-shadow:0 1px 6px rgba(0,0,0,0.04);}
  .saved-entries .se-title{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;justify-content:space-between;}
  .saved-entries .se-clear{font-size:12px;color:#aaa;cursor:pointer;text-decoration:underline;}

  /* Footer */
  .footer{text-align:center;padding:24px 0 12px;font-size:12px;color:#bbb;}

  /* No results */
  .no-results{text-align:center;padding:32px;color:#aaa;font-size:14px;display:none;}

  /* Modal for adding entry */
  .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:100;justify-content:center;align-items:center;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:#fff;border-radius:18px;padding:24px;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
  .modal-box h3{font-size:16px;margin-bottom:12px;}
  .modal-box input,.modal-box select,.modal-box textarea{width:100%;padding:8px 12px;border:1px solid #e0dcd4;border-radius:10px;font-size:13px;margin-bottom:10px;outline:none;font-family:inherit;}
  .modal-box textarea{min-height:80px;resize:vertical;}
  .modal-box .modal-actions{display:flex;gap:8px;justify-content:flex-end;}
  .modal-box .modal-btn{padding:8px 20px;border-radius:10px;font-size:13px;cursor:pointer;border:none;}
  .modal-box .modal-btn.confirm{background:#f48fb1;color:#fff;}
  .modal-box .modal-btn.cancel{background:#f0f0f0;color:#888;}

  /* ===== Mobile Responsive ===== */
  @media(max-width:640px){
    .container{padding:16px 12px;}
    .header{padding:20px 0 16px;}
    .header h1{font-size:24px;}
    .header .sub{font-size:13px;}
    .stats-bar{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
    .stat-item{padding:10px 8px;min-width:0;}
    .stat-item .num{font-size:18px;}
    .stat-item .label{font-size:10px;}
    .filter-tabs{flex-wrap:nowrap;overflow-x:auto;gap:6px;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .filter-tabs::-webkit-scrollbar{display:none;}
    .filter-tab{flex-shrink:0;padding:6px 14px;font-size:12px;}
    .shelf{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
    .book-card{padding:14px;}
    .book-card .icon{font-size:24px;}
    .book-card .title{font-size:13px;}
    .book-card .desc{font-size:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .section-title{font-size:15px;margin:20px 0 10px;}
    .quick-add{padding:14px 16px;margin:16px 0;}
    .quick-add textarea{font-size:16px;} /* Prevent iOS zoom */
    .modal-box{padding:20px;width:95%;max-width:380px;}
    .recent-item{padding:10px 0;}
  }

  @media(max-width:400px){
    .header h1{font-size:20px;}
    .header{padding:16px 0 12px;}
    .shelf{grid-template-columns:1fr;gap:8px;}
    .book-card{padding:12px;}
    .book-card .title{font-size:14px;} /* Bigger for readability */
    .book-card .desc{-webkit-line-clamp:3;}
    .search-bar input{font-size:16px;padding:10px 14px 10px 40px;} /* Prevent iOS zoom */
    .stats-bar{grid-template-columns:repeat(2,1fr);gap:6px;}
    .stat-item{padding:8px 6px;}
    .stat-item .num{font-size:16px;}
  }

  @media(max-width:360px){
    .container{padding:12px 8px;}
    .header h1{font-size:18px;}
    .filter-tab{padding:5px 10px;font-size:11px;}
  }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>📚 槐的运营图书馆</h1>
    <div class="sub" id="dateDisplay">🐙 章鱼爬爬帮你管</div>
    <div class="date-badge" id="todayBadge">加载中…</div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-item"><div class="num" id="statEntries">0</div><div class="label">📖 知识条目</div></div>
    <div class="stat-item"><div class="num" id="statTools">0</div><div class="label">🛠️ 小工具</div></div>
    <div class="stat-item"><div class="num" id="statDays">0</div><div class="label">📆 学习天数</div></div>
    <div class="stat-item"><div class="num" id="statStreak">0</div><div class="label">🔥 连续天数</div></div>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索知识库…" oninput="filterLibrary()">
  </div>

  <!-- Filter tabs -->
  <div class="filter-tabs" id="filterTabs">
    <span class="filter-tab active" data-filter="all" onclick="setFilter('all',this)">📋 全部</span>
    <span class="filter-tab" data-filter="concept" onclick="setFilter('concept',this)">📖 概念</span>
    <span class="filter-tab" data-filter="data" onclick="setFilter('data',this)">📊 数据</span>
    <span class="filter-tab" data-filter="case" onclick="setFilter('case',this)">💡 案例</span>
    <span class="filter-tab" data-filter="tool" onclick="setFilter('tool',this)">🛠️ 工具</span>
    <span class="filter-tab" data-filter="diary" onclick="setFilter('diary',this)">📝 日记</span>
  </div>

  <!-- Book shelves -->
  <div id="shelfContainer"></div>

  <!-- No results -->
  <div class="no-results" id="noResults">🔍 没找到相关内容，试试换个关键词？</div>

  <!-- Quick add -->
  <div class="quick-add">
    <div class="qa-title">✍️ 快速记录</div>
    <textarea id="quickText" placeholder="今天学到了什么？或有什么新想法？&#10;比如：今天学会了RFM模型…"></textarea>
    <div class="qa-actions">
      <button class="qa-btn save" onclick="quickSave()">📥 存进知识库</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">🐙 章鱼爬爬 · 槐的个人运营图书馆 · 所有数据保存在你的电脑本地</div>
</div>

<script>
  // ====== Sample Knowledge Base ======
  let library = [];

  function initLibrary(){
    const saved=localStorage.getItem('huaiLibrary');
    if(saved){library=JSON.parse(saved);render();return;}
    library=[
      {id:1,cat:'concept',title:'DAU（日活跃用户）',desc:'一天内登录游戏的独立用户数量。衡量产品规模的核心指标',time:Date.now()-86400000*1},
      {id:2,cat:'concept',title:'MAU（月活跃用户）',desc:'一个月内登录游戏的独立用户数量。DAU/MAU可衡量用户粘性',time:Date.now()-86400000*2},
      {id:3,cat:'concept',title:'留存率',desc:'新增用户在第N天后仍在玩的比例。次日/7日/30日留存是三大黄金指标',time:Date.now()-86400000*2},
      {id:4,cat:'concept',title:'ARPU（每用户平均收入）',desc:'总收入÷总用户数。衡量每个用户贡献多少收入',time:Date.now()-86400000*3},
      {id:5,cat:'concept',title:'LTV（生命周期价值）',desc:'一个用户从来到走，总共贡献的收入。LTV > CAC 才健康',time:Date.now()-86400000*3},
      {id:6,cat:'concept',title:'A/B测试',desc:'对照组 vs 实验组，用数据做决策。p<0.05才算显著',time:Date.now()-86400000*1},
      {id:7,cat:'concept',title:'RFM模型',desc:'最近消费(R)+消费频率(F)+消费金额(M)。把用户分成8层',time:Date.now()-86400000*4},
      {id:8,cat:'concept',title:'AARRR模型',desc:'获取→激活→留存→收入→传播。海盗指标，运营框架',time:Date.now()-86400000*4},
      {id:9,cat:'concept',title:'用户分层',desc:'不是所有用户都一样，按价值/行为分群，差异化运营',time:Date.now()-86400000*5},
      {id:10,cat:'data',title:'付费渗透率',desc:'付费用户÷活跃用户×100%。休闲2-5%/中度5-10%/重度10-20%',time:Date.now()-86400000*2},
      {id:11,cat:'data',title:'次日留存健康值',desc:'休闲30-40%/中度40-45%/重度45%+。低于30%需排查问题',time:Date.now()-86400000*3},
      {id:12,cat:'data',title:'7日留存健康值',desc:'休闲15-20%/中度20-25%/重度25%+。反映一周体验是否留住人',time:Date.now()-86400000*3},
      {id:13,cat:'data',title:'DAU成本',desc:'(买量+活动+服务器+人力)÷DAU。LTV需大于DAU成本×平均生命周期',time:Date.now()-86400000*4},
      {id:14,cat:'data',title:'月流失率',desc:'休闲20-40%/中度15-25%/重度5-15%。超过50%需紧急排查',time:Date.now()-86400000*5},
      {id:15,cat:'case',title:'春节DAU翻倍案例',desc:'某游戏春节活动：签到送限定+红包雨+好友召回。DAU从50万涨到120万',time:Date.now()-86400000*6},
      {id:16,cat:'case',title:'首充礼包A/B测试',desc:'测3种礼包：6元档/12元档/6+12组合。6元转化率最高',time:Date.now()-86400000*7},
      {id:17,cat:'case',title:'新手签到奖励设计',desc:'你正在做的！方案A（648金币）vs方案B（限定外观）的A/B测试',time:Date.now()-86400000*0},
      {id:18,cat:'tool',title:'A/B测试结果分析器',desc:'输入A/B组数据，自动判断显著性 → 桌面 A-B测试分析器.html',time:Date.now()-86400000*0},
      {id:19,cat:'tool',title:'运营健康度检查器',desc:'输入5个指标→自动判断「健康/关注/预警」→ 待做',time:Date.now()-86400000*0},
      {id:20,cat:'tool',title:'上线检查清单',desc:'活动上线前逐项打勾，全部完成才可上线 → 待做',time:Date.now()-86400000*0},
      {id:21,cat:'tool',title:'文案生成器',desc:'输入活动信息→一键生成公告/Push/社媒文案→ 待做',time:Date.now()-86400000*0},
      {id:22,cat:'tool',title:'运营术语卡片机',desc:'40个术语翻转卡片，每日复习 → 待做',time:Date.now()-86400000*0},
    ];
    saveLib();render();
  }

  function saveLib(){localStorage.setItem('huaiLibrary',JSON.stringify(library));}

  // ====== Render ======
  let currentFilter='all';
  let currentSearch='';

  function render(){
    renderShelves();
    updateStats();
    updateDate();
  }

  function renderShelves(){
    const container=document.getElementById('shelfContainer');
    const search=document.getElementById('searchInput').value.toLowerCase().trim();
    currentSearch=search;

    let filtered=library.filter(item=>{
      if(currentFilter!=='all'&&item.cat!==currentFilter)return false;
      if(search&&!item.title.toLowerCase().includes(search)&&!item.desc.toLowerCase().includes(search))return false;
      return true;
    });

    document.getElementById('noResults').style.display=filtered.length===0?'block':'none';
    if(filtered.length===0){container.innerHTML='';return;}

    // Group by category
    const cats={concept:[],data:[],case:[],tool:[],diary:[]};
    filtered.forEach(item=>{if(cats[item.cat])cats[item.cat].push(item);});

    const catNames={concept:'📖 核心概念',data:'📊 数据指标',case:'💡 真实案例',tool:'🛠️ 效率工具',diary:'📝 学习日记'};
    const catTags={concept:'concept',data:'data',case:'case',tool:'tool',diary:'concept'};

    let html='';
    for(const [key,items] of Object.entries(cats)){
      if(items.length===0)continue;
      html+=`<div class="section-title">${catNames[key]}<span style="font-size:12px;color:#aaa;font-weight:400;">（${items.length}条）</span></div>`;
      html+=`<div class="shelf">`;
      items.sort((a,b)=>b.time-a.time).forEach(item=>{
        const d=new Date(item.time);
        const dateStr=`${d.getMonth()+1}/${d.getDate()}`;
        html+=`<div class="book-card" onclick="openEdit(${item.id})">
          <div class="icon">${item.cat==='concept'?'📖':item.cat==='data'?'📊':item.cat==='case'?'💡':item.cat==='tool'?'🛠️':'📝'}</div>
          <div class="title">${item.title}</div>
          <div class="desc">${item.desc}</div>
          <span class="tag ${catTags[item.cat]}">${catNames[item.cat].replace(/[^\u4e00-\u9fa5a-zA-Z]/g,'')}</span>
          <span style="font-size:10px;color:#bbb;margin-left:6px;">${dateStr}</span>
        </div>`;
      });
      html+=`</div>`;
    }
    container.innerHTML=html;
  }

  function updateStats(){
    const concepts=library.filter(i=>i.cat==='concept').length;
    const data=library.filter(i=>i.cat==='data').length;
    const cases=library.filter(i=>i.cat==='case').length;
    const tools=library.filter(i=>i.cat==='tool').length;
    const diary=library.filter(i=>i.cat==='diary').length;
    document.getElementById('statEntries').textContent=library.length;

    // Count unique tool dates
    const toolDates=new Set(library.filter(i=>i.cat==='tool').map(i=>new Date(i.time).toDateString()));
    document.getElementById('statTools').textContent=tools;

    // Learning days: count days where entries were added
    const days=new Set(library.map(i=>new Date(i.time).toDateString()));
    document.getElementById('statDays').textContent=days.size;

    // Streak: consecutive days ending today
    const sortedDays=[...days].sort((a,b)=>new Date(b)-new Date(a));
    let streak=0;
    const today=new Date();today.setHours(0,0,0,0);
    for(let i=0;i<sortedDays.length;i++){
      const d=new Date(sortedDays[i]);d.setHours(0,0,0,0);
      const diff=Math.round((today-d)/(86400000));
      if(diff===streak)streak++;
      else break;
    }
    document.getElementById('statStreak').textContent=streak;
  }

  function updateDate(){
    const now=new Date();
    const wk=['日','一','二','三','四','五','六'];
    document.getElementById('todayBadge').textContent=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${wk[now.getDay()]}`;
  }

  // ====== Filter & Search ======
  function setFilter(filter,el){
    currentFilter=filter;
    document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    renderShelves();
  }

  function filterLibrary(){
    renderShelves();
  }

  // ====== Quick Save ======
  function quickSave(){
    const text=document.getElementById('quickText').value.trim();
    if(!text){alert('先写点内容再存～');return;}
    const lines=text.split('\n').filter(l=>l.trim());
    const firstLine=lines[0].substring(0,40);
    const rest=lines.slice(1).join(' ').substring(0,100)||firstLine;

    // Ask for category
    const cat=prompt('选个分类：\n1=📖 概念  2=📊 数据  3=💡 案例  4=🛠️ 工具  5=📝 日记','5');
    const catMap={'1':'concept','2':'data','3':'case','4':'tool','5':'diary'};
    const catName=catMap[cat]||'diary';

    library.push({
      id:Date.now(),
      cat:catName,
      title:firstLine,
      desc:rest,
      time:Date.now()
    });
    saveLib();
    document.getElementById('quickText').value='';
    render();
    alert('✅ 已保存！');
  }

  // ====== Edit / Delete ======
  function openEdit(id){
    const item=library.find(i=>i.id===id);
    if(!item)return;
    const title=prompt('修改标题：',item.title);
    if(title===null)return;
    const desc=prompt('修改描述：',item.desc);
    if(desc===null)return;
    const catPrompt=prompt('修改分类：\n1=概念 2=数据 3=案例 4=工具 5=日记\n留空不改','');
    const catMap={'1':'concept','2':'data','3':'case','4':'tool','5':'diary'};
    item.title=title;
    item.desc=desc;
    if(catPrompt&&catMap[catPrompt])item.cat=catMap[catPrompt];
    saveLib();render();
  }

  // ====== Init ======
  initLibrary();
</script>
</body>
</html>
