<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐙 槐的小站</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(135deg,#fce4ec 0%,#f8f0e6 40%,#e8f5e9 100%);
    color:#3d3a35;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  }

  .glass-card{
    background:rgba(255,255,255,0.55);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border-radius:28px;
    padding:44px 40px;
    max-width:420px;width:100%;
    box-shadow:0 8px 40px rgba(0,0,0,0.06),inset 0 1px 0 rgba(255,255,255,0.6);
    border:1px solid rgba(255,255,255,0.35);
    text-align:center;
  }

  h1{font-size:28px;margin-bottom:4px;color:#4a4a4a;}
  .sub{color:#999;font-size:14px;margin-bottom:30px;}

  .links{display:flex;flex-direction:column;gap:14px;}

  .glass-btn{
    display:flex;align-items:center;gap:14px;
    padding:18px 22px;border-radius:18px;
    text-decoration:none;color:#4a4a4a;
    transition:all 0.3s ease;
    background:rgba(255,255,255,0.4);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.5);
    text-align:left;
    box-shadow:0 2px 8px rgba(0,0,0,0.03);
  }
  .glass-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 28px rgba(244,143,177,0.15),0 2px 8px rgba(0,0,0,0.04);
    border-color:rgba(244,143,177,0.3);
    background:rgba(255,255,255,0.6);
  }

  .link-icon{
    font-size:34px;flex-shrink:0;
    width:50px;height:50px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
  }
  .link-icon.lib{
    background:rgba(165,214,167,0.25);
    backdrop-filter:blur(8px);
    border:1px solid rgba(165,214,167,0.3);
  }
  .link-icon.chal{
    background:rgba(244,143,177,0.25);
    backdrop-filter:blur(8px);
    border:1px solid rgba(244,143,177,0.3);
  }

  .link-title{font-size:16px;font-weight:700;}
  .link-desc{font-size:12px;color:#999;margin-top:2px;}
  .footer{font-size:12px;color:#bbb;margin-top:28px;}

  .deco-dot{
    display:inline-block;width:8px;height:8px;border-radius:50%;
    background:rgba(244,143,177,0.4);margin:0 4px;
  }
  .deco-dot.g{background:rgba(165,214,167,0.4);}

  @media(max-width:480px){
    body{padding:16px;}
    .glass-card{padding:32px 24px;border-radius:22px;}
    h1{font-size:24px;}
    .glass-btn{padding:14px 16px;gap:12px;}
    .link-icon{width:44px;height:44px;font-size:28px;}
    .link-title{font-size:15px;}
  }
</style>
</head>
<body>
<div class="glass-card">
  <h1>🐙 槐的小站</h1>
  <div class="links">
    <a href="library.html" class="glass-btn">
      <div class="link-icon lib">📚</div>
      <div>
        <div class="link-title">槐的运营图书馆</div>
      </div>
    </a>
    <a href="challenge.html" class="glass-btn">
      <div class="link-icon chal">🎯</div>
      <div>
        <div class="link-title">槐的挑战池</div>
      </div>
    </a>
  </div>
  <div class="footer">🐙</div>
</div>
</body>
</html>
