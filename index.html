<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐙 槐的小站</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#fdf6f0,#f0f7f0);color:#3d3a35;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:#fff;border-radius:24px;padding:40px 36px;max-width:420px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.06);text-align:center;}
  h1{font-size:28px;margin-bottom:6px;}
  .sub{color:#9a9a8a;font-size:14px;margin-bottom:28px;}
  .links{display:flex;flex-direction:column;gap:14px;}
  .link-btn{display:flex;align-items:center;gap:14px;padding:18px 22px;border-radius:16px;text-decoration:none;color:#3d3a35;transition:all 0.25s;border:1.5px solid #ede9e2;text-align:left;}
  .link-btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,0.06);border-color:#d4cdc2;}
  .link-icon{font-size:36px;flex-shrink:0;width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;}
  .link-icon.lib{background:#fff3e0;}
  .link-icon.chal{background:#fce4ec;}
  .link-title{font-size:16px;font-weight:700;}
  .link-desc{font-size:12px;color:#9a9a8a;margin-top:2px;}
  .footer{font-size:12px;color:#b8b0a2;margin-top:28px;}
</style>
</head>
<body>
<div class="card">
  <h1>🐙 槐的小站</h1>
  <p class="sub">章鱼爬爬帮你搭的专属页面 ✨</p>
  <div class="links">
    <a href="library.html" class="link-btn">
      <div class="link-icon lib">📚</div>
      <div>
        <div class="link-title">槐的运营图书馆</div>
        <div class="link-desc">22条运营知识 + 搜索 + 收藏</div>
      </div>
    </a>
    <a href="challenge.html" class="link-btn">
      <div class="link-icon chal">🎯</div>
      <div>
        <div class="link-title">槐的挑战池</div>
        <div class="link-desc">30个挑战任务 + 随堂测验 + 每日打卡</div>
      </div>
    </a>
  </div>
  <div class="footer">🐙 Made with love by 章鱼爬爬</div>
</div>
</body>
</html>
